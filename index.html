<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Q4 Seatwork 1</title>

    <style>
        #loginthing{
            border: 2px, solid black;
            border-radius: 12px;
            margin-left: 400px;
            margin-right: 400px;
            text-align: center  ;
            background-color: #435169;
        }

        footer{
            display: block;
            text-align: center;
            padding: 3px;
            background-color: rgb(0, 0, 0, 0.5);
             height: 35px;
            left: 0;
            bottom: 0;
            width: 100%;
            color: white;
            position: fixed;
        }

        body{
            background-color: #7aadff;
        }

        p{
            color: white;
        }
        
    </style>
</head>
<body>
    <div class="col mt-3" id="loginthing">
        <h2  style="color: white;"   >Login</h2>

        <br>

        <details  style="color: white;" ontoggle="instructing()">
            <summary><u></u></summary>
            <i id="plshelp"></i>
        </details>

        <br>

        <label for="user" style="color: white;">Username</label>
        <input type="text" id="username" class="form-control" style="border-radius: 20px;">

        <br>

        <label  for="pass" style="color: white;">Password</label>
        <input type="text" id="passwording" class="form-control" style="border-radius: 20px;">

        <br>

        <label for="stayright" style="color: white;">Stay logged in</label>
        <input class="form-check-input" type="checkbox" id="wannastay" value="stay" name="staying" onclick="checkingthebox()">

        <p id="staylogin1"></p>

        <br><br>

        <button class="btn btn-primary" onclick="loginnow()" >Login</button>
        <button class="btn" type="reset" value="reset" style="background-color: white;">Cancel</button>

        <br><br>

    </div>

    <script>
        function loginnow(){
            var username = document.getElementById("username").value; // sets whatever the user input is as a variabl
            var password = document.getElementById("passwording").value;
            let correctname = "jarvisjoven6741";
            let correctpassword = "6741sixseven$";

            if(username === correctname && password === correctpassword){
                alert("Welcome jarvisjoven6741!");
            } // checks if the username and password correspond to the correct one
            else{
                alert("The username/password is incorrect.");
            } // if not, then alerts that the login details are wrong
        }

        function instructing(){
            document.getElementById('plshelp').innerHTML = "Input the correct name and password to login. Password must have atleast 8 characters and 1 special character. Username must be minimum 8 characters, with a maximum of 16."
        }

        function checkingthebox(){
            var checkbox = document.getElementById("wannastay").checked;
            var stayloginned = "Your session will stay active on this device";
            switch(checkbox){
                case true: document.getElementById('staylogin1').innerHTML = stayloginned;
                break;

                case false: document.getElementById("").innerHTML;
                break;
            }
        }
    
        </script>
        
        <footer>
            <p>Jarivs Joven, 9-Emerald</p>
        </footer>
</body>
</html>
